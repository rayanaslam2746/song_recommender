<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Song Vibe Finder</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 16px;
    line-height: 1.5;
    color: #1a1a1a;
  }
  h1 { margin-bottom: 4px; }
  h2 { font-size: 16px; margin: 0 0 8px; }
  .instructions { color: #555; margin-top: 0; margin-bottom: 24px; }
  .search-bar { display: flex; gap: 8px; margin-bottom: 24px; max-width: 600px; }
  #query {
    flex: 1;
    font-size: 16px;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
  }
  #search-btn {
    font-size: 16px;
    padding: 10px 16px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #f5f5f5;
    cursor: pointer;
  }
  .status { color: #555; }
  .error { color: #b00020; }

  /* Side by side so a click's results are visible without scrolling past the search list. */
  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 700px) {
    .columns { grid-template-columns: 1fr; }
  }
  .column {
    border: 1px solid #eee;
    border-radius: 8px;
    padding: 12px;
    max-height: 70vh;
    overflow-y: auto;
  }

  .song-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
  }
  .song-row:hover { background: #f0f0f0; }
  .song-row.disabled {
    opacity: 0.5;
    cursor: default;
  }
  .song-row.disabled:hover { background: none; }
  .song-row img { border-radius: 4px; flex-shrink: 0; }
  .song-info { flex: 1; min-width: 0; }
  .song-title { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .song-artist { color: #555; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .unavailable { color: #999; font-size: 13px; white-space: nowrap; }

  .rec-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 8px;
    border-bottom: 1px solid #eee;
  }
  .rec-rank { font-weight: 600; color: #888; width: 22px; flex-shrink: 0; }
  .rec-info { flex: 1; min-width: 0; }
  .rec-info audio { width: 100%; margin-top: 6px; height: 32px; }

  .match-badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    padding: 1px 8px;
    border-radius: 10px;
    margin-right: 6px;
  }
  .match-strong { background: #d7f3df; color: #1a7431; }
  .match-decent { background: #fdf0cc; color: #8a6300; }
  .match-weak   { background: #eee; color: #666; }
</style>
</head>
<body>

<h1>Song Vibe Finder</h1>
<p class="instructions">Start typing your song and press Enter for results.</p>

<div class="search-bar">
  <input id="query" type="text" placeholder="Search for a song..." autofocus>
  <button id="search-btn">Search</button>
</div>

<p id="error" class="error"></p>

<div class="columns">
  <div>
    <h2>Search results</h2>
    <div id="results" class="column"></div>
  </div>
  <div>
    <h2>Recommendations</h2>
    <div id="recommendations" class="column"></div>
  </div>
</div>

<script>
const input = document.getElementById('query');
const searchBtn = document.getElementById('search-btn');
const resultsEl = document.getElementById('results');
const recEl = document.getElementById('recommendations');
const errorEl = document.getElementById('error');

// Thresholds are calibrated against what this catalog actually produces: genuine
// same-song duplicates/versions score ~0.95+, while a "nothing great in the catalog"
// query still returns its closest available neighbors around 0.75-0.85. Below that,
// treat it as a weak/coincidental match rather than implying it's a real vibe match.
const STRONG_THRESHOLD = 0.85;
const DECENT_THRESHOLD = 0.70;

function matchBadge(score) {
  if (score >= STRONG_THRESHOLD) return { label: 'Strong match', cls: 'match-strong' };
  if (score >= DECENT_THRESHOLD) return { label: 'Decent match', cls: 'match-decent' };
  return { label: 'Weak match', cls: 'match-weak' };
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s ?? '';
  return div.innerHTML;
}

async function doSearch() {
  const q = input.value.trim();
  if (!q) return;

  errorEl.textContent = '';
  recEl.innerHTML = '';
  resultsEl.innerHTML = '<p class="status">Searching...</p>';

  try {
    const resp = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'Search failed');
    renderResults(data.results);
  } catch (e) {
    resultsEl.innerHTML = '';
    errorEl.textContent = e.message;
  }
}

function renderResults(results) {
  if (!results.length) {
    resultsEl.innerHTML = '<p class="status">No results.</p>';
    return;
  }
  resultsEl.innerHTML = '';
  for (const r of results) {
    const row = document.createElement('div');
    row.className = 'song-row' + (r.preview_url ? '' : ' disabled');
    row.innerHTML = `
      <img src="${r.artwork || ''}" alt="" width="48" height="48">
      <div class="song-info">
        <div class="song-title">${escapeHtml(r.title)}</div>
        <div class="song-artist">${escapeHtml(r.artist)}</div>
      </div>
      ${r.preview_url ? '' : '<span class="unavailable">preview unavailable</span>'}
    `;
    if (r.preview_url) {
      row.addEventListener('click', () => selectSong(r));
    }
    resultsEl.appendChild(row);
  }
}

async function selectSong(song) {
  errorEl.textContent = '';
  recEl.innerHTML = '<p class="status">Analyzing this track...</p>';

  try {
    const resp = await fetch('/api/recommend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        itunes_track_id: song.itunes_track_id,
        title: song.title,
        artist: song.artist,
        preview_url: song.preview_url,
      }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'Recommendation failed');
    renderRecommendations(data.results);
  } catch (e) {
    recEl.innerHTML = '';
    errorEl.textContent = e.message;
  }
}

function renderRecommendations(results) {
  if (!results.length) {
    recEl.innerHTML = '<p class="status">No recommendations found.</p>';
    return;
  }
  recEl.innerHTML = '';
  results.forEach((r, i) => {
    const badge = matchBadge(r.score);
    const row = document.createElement('div');
    row.className = 'rec-row';
    row.innerHTML = `
      <div class="rec-rank">#${i + 1}</div>
      <div class="rec-info">
        <div class="song-title">${escapeHtml(r.title)}</div>
        <div class="song-artist">
          <span class="match-badge ${badge.cls}">${badge.label}</span>
          ${escapeHtml(r.artist)} &middot; score ${r.score.toFixed(3)}
        </div>
        ${r.preview_url
          ? `<audio controls src="${r.preview_url}"></audio>`
          : '<span class="unavailable">no preview</span>'}
      </div>
    `;
    recEl.appendChild(row);
  });
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doSearch();
});
searchBtn.addEventListener('click', doSearch);
</script>

</body>
</html>
